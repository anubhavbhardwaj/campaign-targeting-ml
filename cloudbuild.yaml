steps:
  # Step 1 — Train model and run tests
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y libgomp1 -q
        pip install -r requirements.txt -q
        pip install -e . -q
        python train.py --source bigquery
        pytest tests/ -v

  # Step 2 — Build API image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'europe-west1-docker.pkg.dev/anubhaviiitb/campaign-targeting/api:latest',
      '.'
    ]

  # Step 3 — Push API image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'europe-west1-docker.pkg.dev/anubhaviiitb/campaign-targeting/api:latest'
    ]

  # Step 4 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args: [
      'gcloud', 'run', 'deploy', 'campaign-targeting-api',
      '--image', 'europe-west1-docker.pkg.dev/anubhaviiitb/campaign-targeting/api:latest',
      '--platform', 'managed',
      '--region', 'europe-west1',
      '--allow-unauthenticated',
      '--port', '8080'
    ]

  # Step 5 — Compile pipeline YAML and upload to GCS
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y -q
        pip install kfp==2.16.1 google-cloud-aiplatform==1.152.0 -q
        cd src/pipelines
        PYTHONPATH=../../ python -c "
        from kfp import compiler
        from pipeline import retraining_pipeline
        compiler.Compiler().compile(
            pipeline_func=retraining_pipeline,
            package_path='/workspace/campaign_targeting_pipeline.yaml'
        )
        print('Pipeline compiled successfully')
        "
        gsutil cp /workspace/campaign_targeting_pipeline.yaml \
          gs://anubhaviiitb-pipeline-artifacts/pipelines/campaign_targeting_pipeline.yaml
        echo "Pipeline YAML uploaded to GCS"

images:
  - 'europe-west1-docker.pkg.dev/anubhaviiitb/campaign-targeting/api:latest'

options:
  logging: CLOUD_LOGGING_ONLY